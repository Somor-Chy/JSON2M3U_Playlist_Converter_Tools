<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Smart JSON ⇄ M3U Playlist Converter Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ----- CSS Variables ----- */
        :root {
            --bg-gradient: linear-gradient(145deg, #f4f9fc, #e2eef5);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-primary: #0b2e3c;
            --text-secondary: #1e4a5c;
            --border-light: #c2dae5;
            --accent: #1f7a8c;
            --accent-hover: #0e5668;
            --input-bg: #ffffff;
            --textarea-bg: #0b262f;
            --textarea-color: #e6f3f8;
            --error-bg: #ffeae8;
            --error-color: #bc3f34;
            --success-bg: #dff0d8;
            --success-color: #1f5c3d;
            --badge-bg: #bed9e6;
            --shadow: 0 20px 40px rgba(0, 15, 30, 0.1);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(145deg, #0a1a22, #112a35, #0e2e3c);
            --card-bg: rgba(20, 35, 45, 0.95);
            --text-primary: #d8e9f0;
            --text-secondary: #b0cfdc;
            --border-light: #2a5566;
            --accent: #3fa2b8;
            --accent-hover: #5bbcd4;
            --input-bg: #1a3340;
            --textarea-bg: #051218;
            --textarea-color: #cce3ec;
            --error-bg: #3d1e1c;
            --error-color: #f28b82;
            --success-bg: #1a3a2a;
            --success-color: #a5d6a5;
            --badge-bg: #2a5566;
            --shadow: 0 20px 40px rgba(0,0,0,0.5);
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Segoe UI', 'Noto Sans', 'Noto Sans Bengali', system-ui, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
            transition: background 0.2s;
        }

        .card {
            max-width: 1600px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 36px;
            box-shadow: var(--shadow);
            padding: 24px 26px 32px;
            border: 1px solid var(--border-light);
        }

        /* ----- Header ----- */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 2rem;
            color: var(--text-primary);
            margin: 0;
        }
        h1 span {
            background: var(--accent);
            color: white;
            font-size: 0.8rem;
            padding: 4px 14px;
            border-radius: 60px;
        }

        .control-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: var(--input-bg);
            border: 1.5px solid var(--border-light);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.15s;
        }
        .icon-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        select.icon-btn {
            appearance: none;
            padding-right: 30px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 14px;
        }

        /* ----- Dual Column Layout ----- */
        .converter-row {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .converter-col {
            flex: 1 1 600px;
            min-width: 580px;
            background: var(--input-bg);
            border-radius: 28px;
            padding: 22px;
            border: 1px solid var(--border-light);
        }

        .col-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 18px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ----- Mapping Panel (Left only) ----- */
        .mapping-panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
        }

        .field-mapping {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
        }

        .map-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .map-item label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .map-item input {
            padding: 8px 12px;
            border: 1.5px solid var(--border-light);
            border-radius: 30px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        /* ----- Input Areas ----- */
        .input-section {
            margin-bottom: 20px;
        }
        .upload-area {
            border: 2px dashed var(--accent);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            background: var(--card-bg);
            cursor: pointer;
            margin-bottom: 12px;
        }
        .file-input {
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-primary);
            width: 100%;
        }
        .paste-textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            font-family: monospace;
            background: var(--card-bg);
            border: 1.5px solid var(--border-light);
            border-radius: 20px;
            resize: vertical;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .convert-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 48px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            transition: 0.15s;
            margin-bottom: 20px;
        }
        .convert-btn:hover {
            background: var(--accent-hover);
        }

        /* ----- Output Areas ----- */
        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0 10px;
        }
        .output-header h3 {
            color: var(--text-primary);
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: var(--input-bg);
            border: 1.5px solid var(--border-light);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .output-textarea {
            width: 100%;
            height: 280px;
            padding: 18px;
            font-family: 'SF Mono', monospace;
            background: var(--textarea-bg);
            color: var(--textarea-color);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            resize: vertical;
            white-space: pre;
            overflow: auto;
        }
        .output-textarea::selection {
            background: #f9e64b;
            color: #000;
        }

        .error-msg {
            padding: 12px 18px;
            border-radius: 40px;
            margin-top: 14px;
            display: none;
        }

        .format-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        .format-selector label {
            color: var(--text-primary);
            font-weight: 600;
        }
        select.format-select {
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1.5px solid var(--border-light);
            border-radius: 30px;
            padding: 8px 16px;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--input-bg);
            border-radius: 40px;
            border: 1.5px solid var(--border-light);
            padding: 2px;
        }
        .search-wrapper input {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            width: 160px;
            outline: none;
        }

        /* Language rules */
        html[lang="en"] body .lang-bn { display: none !important; }
        html[lang="bn"] body .lang-en { display: none !important; }
        html[lang="bn"] body .lang-bn { display: inline !important; }
        html[lang="en"] body .lang-en { display: inline !important; }

        /* Responsive fine-tune */
        @media (max-width: 1300px) {
            .converter-col { min-width: 500px; }
        }
    </style>
</head>
<body lang="en" data-theme="light">
<div class="card">
    <!-- Header -->
    <div class="top-bar">
        <h1>
            🔄 <span class="lang-en">JSON ↔ M3U</span><span class="lang-bn">JSON ↔ M3U</span>
            <span class="lang-en" style="font-size:0.7rem;">Bidirectional</span>
            <span class="lang-bn" style="font-size:0.7rem;">দ্বিমুখী</span>
        </h1>
        <div class="control-group">
            <button class="icon-btn" id="langToggle" title="Toggle Language">
                🌐 <span class="lang-en">বাংলা</span><span class="lang-bn">English</span>
            </button>
            <select class="icon-btn" id="themeSelect" title="Theme">
                <option value="light">☀️ Light</option>
                <option value="dark">🌙 Dark</option>
                <option value="system">💻 System</option>
            </select>
        </div>
    </div>

    <!-- Two Converter Columns -->
    <div class="converter-row">
        <!-- ========== LEFT: JSON to M3U ========= -->
        <div class="converter-col">
            <div class="col-title">
                📥 <span class="lang-en">JSON → M3U</span><span class="lang-bn">JSON → M3U</span>
            </div>

            <!-- Field Mapping (JSON→M3U) -->
            <div class="mapping-panel">
                <div style="font-weight:600; margin-bottom:10px; color:var(--text-primary);">
                    <span class="lang-en">⚙️ Field Mapping</span><span class="lang-bn">⚙️ ফিল্ড ম্যাপিং</span>
                </div>
                <div class="field-mapping">
                    <div class="map-item"><label>tvg-id</label><input type="text" id="mapId" value="id,channel_id,cid,tvg-id"></div>
                    <div class="map-item"><label>tvg-logo</label><input type="text" id="mapLogo" value="logo,channel_logo,tvg-logo,icon,image"></div>
                    <div class="map-item"><label>group-title</label><input type="text" id="mapGroup" value="group,cat_name,category,genre,group-title"></div>
                    <div class="map-item"><label>Title</label><input type="text" id="mapTitle" value="title,name,channel_name,display_name"></div>
                    <div class="map-item"><label>URL</label><input type="text" id="mapUrl" value="url,stream_url,file,src,link"></div>
                </div>
            </div>

            <!-- Input: Upload + Paste -->
            <div class="input-section">
                <div class="upload-area" id="dropZoneJson">
                    <div style="margin-bottom:6px;"><span class="lang-en">⬆️ Upload JSON file</span><span class="lang-bn">⬆️ JSON ফাইল আপলোড</span></div>
                    <input type="file" id="jsonFileInput" accept=".json,application/json" class="file-input">
                    <button class="icon-btn" id="loadSampleBtn" style="margin-top:10px;">✨ <span class="lang-en">Load Sample</span><span class="lang-bn">স্যাম্পল</span></button>
                </div>
                <textarea id="jsonPasteInput" class="paste-textarea" placeholder='[{"cat_name":"News","livetvs":[...]}]'></textarea>
                <button class="convert-btn" id="jsonToM3uBtn">🔄 <span class="lang-en">Convert to M3U</span><span class="lang-bn">M3U তৈরি করুন</span></button>
            </div>

            <!-- Output: M3U with search & copy/download -->
            <div class="output-header">
                <h3><span class="lang-en">📄 M3U Output</span><span class="lang-bn">📄 M3U আউটপুট</span></h3>
                <div class="search-wrapper">
                    <input type="text" id="searchInputM3u" placeholder="🔍 Search...">
                    <button id="searchPrevBtn" title="Previous">◀</button>
                    <button id="searchNextBtn" title="Next">▶</button>
                    <button id="clearSearchBtn" title="Clear">✕</button>
                </div>
                <div class="action-buttons">
                    <button class="btn" id="copyM3uBtn"><span class="lang-en">📋 Copy</span><span class="lang-bn">কপি</span></button>
                    <button class="btn btn-primary" id="downloadM3uBtn"><span class="lang-en">⬇️ Download</span><span class="lang-bn">ডাউনলোড</span></button>
                </div>
            </div>
            <textarea id="m3uOutput" class="output-textarea" readonly placeholder="M3U content will appear here..."></textarea>
            <div id="errorBoxJson" class="error-msg"></div>
        </div>

        <!-- ========== RIGHT: M3U to JSON ========= -->
        <div class="converter-col">
            <div class="col-title">
                📤 <span class="lang-en">M3U → JSON</span><span class="lang-bn">M3U → JSON</span>
            </div>

            <!-- Input: Upload + Paste M3U -->
            <div class="input-section">
                <div class="upload-area" id="dropZoneM3u">
                    <div style="margin-bottom:6px;"><span class="lang-en">⬆️ Upload M3U file</span><span class="lang-bn">⬆️ M3U ফাইল আপলোড</span></div>
                    <input type="file" id="m3uFileInput" accept=".m3u,.m3u8,audio/x-mpegurl,text/plain" class="file-input">
                    <button class="icon-btn" id="loadM3uSampleBtn" style="margin-top:10px;">✨ <span class="lang-en">Load Sample</span><span class="lang-bn">স্যাম্পল</span></button>
                </div>
                <textarea id="m3uPasteInput" class="paste-textarea" placeholder="#EXTM3U ..."></textarea>
                <!-- Output format selector -->
                <div class="format-selector">
                    <label><span class="lang-en">JSON format:</span><span class="lang-bn">JSON ফরম্যাট:</span></label>
                    <select id="jsonFormatSelect" class="format-select">
                        <option value="grouped"><span class="lang-en">Grouped by category</span><span class="lang-bn">ক্যাটাগরি অনুযায়ী গ্রুপ</span></option>
                        <option value="flat"><span class="lang-en">Flat array</span><span class="lang-bn">সরল অ্যারে</span></option>
                    </select>
                </div>
                <button class="convert-btn" id="m3uToJsonBtn">🔄 <span class="lang-en">Convert to JSON</span><span class="lang-bn">JSON তৈরি করুন</span></button>
            </div>

            <!-- Output: JSON -->
            <div class="output-header">
                <h3><span class="lang-en">📄 JSON Output</span><span class="lang-bn">📄 JSON আউটপুট</span></h3>
                <div class="action-buttons">
                    <button class="btn" id="copyJsonBtn"><span class="lang-en">📋 Copy</span><span class="lang-bn">কপি</span></button>
                    <button class="btn btn-primary" id="downloadJsonBtn"><span class="lang-en">⬇️ Download</span><span class="lang-bn">ডাউনলোড</span></button>
                </div>
            </div>
            <textarea id="jsonOutput" class="output-textarea" readonly placeholder="JSON output will appear here..."></textarea>
            <div id="errorBoxM3u" class="error-msg"></div>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";
        // ----- DOM Elements -----
        const body = document.body;
        const html = document.documentElement;
        
        // Left: JSON->M3U
        const jsonFileInput = document.getElementById('jsonFileInput');
        const jsonPasteInput = document.getElementById('jsonPasteInput');
        const jsonToM3uBtn = document.getElementById('jsonToM3uBtn');
        const m3uOutput = document.getElementById('m3uOutput');
        const copyM3uBtn = document.getElementById('copyM3uBtn');
        const downloadM3uBtn = document.getElementById('downloadM3uBtn');
        const errorBoxJson = document.getElementById('errorBoxJson');
        const dropZoneJson = document.getElementById('dropZoneJson');
        const loadSampleBtn = document.getElementById('loadSampleBtn');
        const searchInput = document.getElementById('searchInputM3u');
        const searchPrevBtn = document.getElementById('searchPrevBtn');
        const searchNextBtn = document.getElementById('searchNextBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');

        // Mapping inputs
        const mapId = document.getElementById('mapId');
        const mapLogo = document.getElementById('mapLogo');
        const mapGroup = document.getElementById('mapGroup');
        const mapTitle = document.getElementById('mapTitle');
        const mapUrl = document.getElementById('mapUrl');

        // Right: M3U->JSON
        const m3uFileInput = document.getElementById('m3uFileInput');
        const m3uPasteInput = document.getElementById('m3uPasteInput');
        const m3uToJsonBtn = document.getElementById('m3uToJsonBtn');
        const jsonOutput = document.getElementById('jsonOutput');
        const copyJsonBtn = document.getElementById('copyJsonBtn');
        const downloadJsonBtn = document.getElementById('downloadJsonBtn');
        const errorBoxM3u = document.getElementById('errorBoxM3u');
        const dropZoneM3u = document.getElementById('dropZoneM3u');
        const loadM3uSampleBtn = document.getElementById('loadM3uSampleBtn');
        const jsonFormatSelect = document.getElementById('jsonFormatSelect');

        // Common
        const langToggle = document.getElementById('langToggle');
        const themeSelect = document.getElementById('themeSelect');

        // ----- Language -----
        function setLanguage(lang) {
            html.setAttribute('lang', lang);
            body.setAttribute('lang', lang);
            localStorage.setItem('m3u_lang', lang);
        }
        langToggle.addEventListener('click', () => {
            const cur = html.getAttribute('lang') || 'en';
            setLanguage(cur === 'en' ? 'bn' : 'en');
        });
        setLanguage(localStorage.getItem('m3u_lang') || 'en');

        // ----- Theme -----
        function applyTheme(theme) {
            if (theme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                html.setAttribute('data-theme', isDark ? 'dark' : 'light');
            } else {
                html.setAttribute('data-theme', theme);
            }
            localStorage.setItem('m3u_theme', theme);
        }
        themeSelect.addEventListener('change', e => applyTheme(e.target.value));
        const savedTheme = localStorage.getItem('m3u_theme') || 'light';
        themeSelect.value = savedTheme;
        applyTheme(savedTheme);
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (themeSelect.value === 'system') applyTheme('system');
        });

        // ----- Helper: parse mapping keys -----
        function getMappingKeys(str) { return str.split(',').map(s => s.trim().toLowerCase()).filter(s => s); }

        // ----- JSON -> M3U (adapted from previous) -----
        const SAMPLE_JSON = [{"cat_name":"News","livetvs":[{"id":1,"channel_name":"BBC","stream_url":"http://ex.com/bbc.m3u8","channel_logo":"http://ex.com/bbc.png"}]}];

        // ----- Improved JSON → Channels extraction (FIXED) -----
function extractChannelsFromJson(jsonData) {
    const idKeys = getMappingKeys(mapId.value);
    const logoKeys = getMappingKeys(mapLogo.value);
    const groupKeys = getMappingKeys(mapGroup.value);
    const titleKeys = getMappingKeys(mapTitle.value);
    const urlKeys = getMappingKeys(mapUrl.value);

    // চ্যানেল অ্যারে চেনার ফাংশন
    function looksLikeChannelArray(arr) {
        if (!Array.isArray(arr) || !arr.length) return false;
        const first = arr[0];
        if (!first || typeof first !== 'object') return false;
        // যেকোনো ইউআরএল কী থাকলেই ধরে নেব চ্যানেল লিস্ট
        for (let key in first) {
            if (urlKeys.some(u => key.toLowerCase().includes(u))) return true;
        }
        return false;
    }

    // রিকার্সিভ সার্চ: অবজেক্টের ভেতর থেকে চ্যানেল অ্যারে ও প্যারেন্ট গ্রুপ বের করা
    function extractContexts(data, parent = null, visited = new WeakSet()) {
        let results = [];
        if (!data || typeof data !== 'object') return results;
        if (visited.has(data)) return results;
        visited.add(data);

        if (Array.isArray(data)) {
            if (looksLikeChannelArray(data)) {
                results.push({ array: data, parent });
            } else {
                for (let item of data) {
                    results.push(...extractContexts(item, data, visited));
                }
            }
        } else {
            for (let key in data) {
                if (data.hasOwnProperty(key)) {
                    results.push(...extractContexts(data[key], data, visited));
                }
            }
        }
        return results;
    }

    const contexts = extractContexts(jsonData);
    const channels = [];
    let counter = 0;

    for (let ctx of contexts) {
        // প্যারেন্ট অবজেক্ট থেকে গ্রুপ নাম বের করা (যেমন "title" বা "cat_name")
        let parentGroup = '';
        if (ctx.parent && typeof ctx.parent === 'object') {
            for (let parentKey in ctx.parent) {
                const lowerKey = parentKey.toLowerCase();
                // গ্রুপ ম্যাপিং কীগুলোর সাথে মিল খোঁজা
                if (groupKeys.some(gk => lowerKey.includes(gk))) {
                    parentGroup = String(ctx.parent[parentKey] ?? '');
                    break;
                }
            }
        }

        for (let item of ctx.array) {
            if (!item || typeof item !== 'object') continue;
            counter++;

            let id = '', logo = '', group = parentGroup, title = '', url = '';

            // প্রতিটি চ্যানেল অবজেক্টের সব ফিল্ড চেক করা
            for (let key in item) {
                const lowerKey = key.toLowerCase();
                const value = item[key] != null ? String(item[key]) : '';

                if (!id && idKeys.some(ik => lowerKey.includes(ik))) {
                    id = value;
                }
                // লোগোর জন্য আলাদা করে ম্যাচিং (এখন ঠিকমতো কাজ করবে)
                if (!logo && logoKeys.some(lk => lowerKey.includes(lk))) {
                    logo = value;
                }
                if (!group && groupKeys.some(gk => lowerKey.includes(gk))) {
                    group = value;
                }
                if (!title && titleKeys.some(tk => lowerKey.includes(tk))) {
                    title = value;
                }
                if (!url && urlKeys.some(uk => lowerKey.includes(uk))) {
                    url = value;
                }
            }

            if (!title) title = `Channel ${counter}`;
            if (url) {
                channels.push({
                    id: id,
                    logo: logo,
                    group: group,
                    title: title,
                    url: url
                });
            }
        }
    }
    return channels;
}

        function convertToM3u(channels) {
            const lines = ['#EXTM3U', '', ''];
            for (let ch of channels) {
                lines.push(`#EXTINF:-1 tvg-id="${ch.id}" tvg-logo="${ch.logo}" group-title="${ch.group}",${ch.title}`);
                lines.push(ch.url);
                lines.push('');
            }
            return lines.join('\n');
        }

        function performJsonToM3u() {
            let jsonStr = jsonPasteInput.value.trim();
            if (!jsonStr) { showError(errorBoxJson, 'No JSON input'); return; }
            try {
                const data = JSON.parse(jsonStr);
                const channels = extractChannelsFromJson(data);
                if (!channels.length) throw new Error('No valid channels');
                m3uOutput.value = convertToM3u(channels);
                errorBoxJson.style.display = 'none';
                // reset search
                window.searchMatches = []; window.currentMatch = -1;
            } catch(e) { showError(errorBoxJson, e.message); m3uOutput.value = ''; }
        }

        function showError(box, msg) { box.style.display='block'; box.style.background='var(--error-bg)'; box.style.color='var(--error-color)'; box.textContent='❌ '+msg; }

        // ----- M3U -> JSON -----
        function parseM3u(content) {
            const lines = content.split(/\r?\n/);
            const channels = [];
            let current = null;
            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const info = line.substring(8);
                    const commaIdx = info.indexOf(',');
                    const attrStr = commaIdx >=0 ? info.substring(0, commaIdx) : info;
                    const title = commaIdx >=0 ? info.substring(commaIdx+1).trim() : '';
                    const attrs = {};
                    const regex = /([a-zA-Z-]+)="(.*?)"/g;
                    let m;
                    while((m=regex.exec(attrStr)) !== null) attrs[m[1]] = m[2];
                    current = {
                        id: attrs['tvg-id'] || '',
                        logo: attrs['tvg-logo'] || '',
                        group: attrs['group-title'] || '',
                        title: title || 'Unknown',
                        url: ''
                    };
                } else if (line && !line.startsWith('#')) {
                    if (current) {
                        current.url = line;
                        channels.push(current);
                        current = null;
                    }
                }
            }
            return channels;
        }

        function convertM3uToJson() {
            let m3uStr = m3uPasteInput.value.trim();
            if (!m3uStr) { showError(errorBoxM3u, 'No M3U input'); return; }
            try {
                const channels = parseM3u(m3uStr);
                if (!channels.length) throw new Error('No channels found');
                const format = jsonFormatSelect.value;
                let json;
                if (format === 'grouped') {
                    const groups = {};
                    channels.forEach(ch => {
                        const grp = ch.group || 'Uncategorized';
                        if (!groups[grp]) groups[grp] = [];
                        groups[grp].push({
                            id: ch.id ? parseInt(ch.id) || ch.id : null,
                            channel_name: ch.title,
                            stream_url: ch.url,
                            channel_logo: ch.logo || null
                        });
                    });
                    json = Object.entries(groups).map(([cat, livetvs]) => ({ cat_name: cat, livetvs }));
                } else {
                    json = channels.map(ch => ({
                        id: ch.id || null,
                        channel_name: ch.title,
                        stream_url: ch.url,
                        channel_logo: ch.logo || null,
                        group: ch.group || null
                    }));
                }
                jsonOutput.value = JSON.stringify(json, null, 2);
                errorBoxM3u.style.display = 'none';
            } catch(e) { showError(errorBoxM3u, e.message); jsonOutput.value = ''; }
        }

        // Sample M3U
        const SAMPLE_M3U = `#EXTM3U

#EXTINF:-1 tvg-id="1" tvg-logo="http://ex.com/bbc.png" group-title="News",BBC World
http://ex.com/bbc.m3u8

#EXTINF:-1 tvg-id="2" tvg-logo="http://ex.com/cnn.png" group-title="News",CNN
http://ex.com/cnn.m3u8`;

        // ----- Event listeners -----
        jsonToM3uBtn.addEventListener('click', performJsonToM3u);
        m3uToJsonBtn.addEventListener('click', convertM3uToJson);

        // File handling JSON
        function handleJsonFile(file) {
            const reader = new FileReader();
            reader.onload = e => { jsonPasteInput.value = e.target.result; errorBoxJson.style.display='none'; };
            reader.readAsText(file);
        }
        jsonFileInput.addEventListener('change', e => { if(e.target.files[0]) handleJsonFile(e.target.files[0]); });
        dropZoneJson.addEventListener('dragover', e=>e.preventDefault());
        dropZoneJson.addEventListener('drop', e=>{
            e.preventDefault();
            const f = e.dataTransfer.files[0];
            if(f && f.name.endsWith('.json')){ jsonFileInput.files = e.dataTransfer.files; handleJsonFile(f); }
            else showError(errorBoxJson,'Only JSON');
        });
        loadSampleBtn.addEventListener('click', ()=>{
            jsonPasteInput.value = JSON.stringify(SAMPLE_JSON, null, 2);
            errorBoxJson.style.display='none';
        });

        // M3U file
        function handleM3uFile(file) {
            const reader = new FileReader();
            reader.onload = e => { m3uPasteInput.value = e.target.result; errorBoxM3u.style.display='none'; };
            reader.readAsText(file);
        }
        m3uFileInput.addEventListener('change', e=>{ if(e.target.files[0]) handleM3uFile(e.target.files[0]); });
        dropZoneM3u.addEventListener('dragover', e=>e.preventDefault());
        dropZoneM3u.addEventListener('drop', e=>{
            e.preventDefault();
            const f = e.dataTransfer.files[0];
            if(f && (f.name.endsWith('.m3u')||f.name.endsWith('.m3u8'))){ m3uFileInput.files=e.dataTransfer.files; handleM3uFile(f); }
            else showError(errorBoxM3u,'Only M3U');
        });
        loadM3uSampleBtn.addEventListener('click', ()=>{
            m3uPasteInput.value = SAMPLE_M3U;
            errorBoxM3u.style.display='none';
        });

        // Copy / Download
        copyM3uBtn.addEventListener('click', ()=> navigator.clipboard?.writeText(m3uOutput.value));
        downloadM3uBtn.addEventListener('click', ()=>{
            const blob = new Blob([m3uOutput.value],{type:'audio/x-mpegurl'});
            const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='playlist.m3u'; a.click();
        });
        copyJsonBtn.addEventListener('click', ()=> navigator.clipboard?.writeText(jsonOutput.value));
        downloadJsonBtn.addEventListener('click', ()=>{
            const blob = new Blob([jsonOutput.value],{type:'application/json'});
            const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='playlist.json'; a.click();
        });

        // Search (simplified)
        let searchMatches=[], currentIdx=-1;
        function performSearch(){
            const term = searchInput.value.trim();
            if(!term) { m3uOutput.setSelectionRange(0,0); return; }
            const txt = m3uOutput.value; const lower = txt.toLowerCase(); const t = term.toLowerCase();
            searchMatches=[]; let idx=0;
            while((idx=lower.indexOf(t,idx))!==-1){ searchMatches.push({s:idx,e:idx+term.length}); idx+=term.length; }
            if(searchMatches.length){ currentIdx=0; highlight(); }
        }
        function highlight(){
            if(!searchMatches.length) return;
            const m = searchMatches[currentIdx]; m3uOutput.focus(); m3uOutput.setSelectionRange(m.s,m.e);
        }
        searchInput.addEventListener('input', performSearch);
        searchPrevBtn.addEventListener('click', ()=>{ if(searchMatches.length){ currentIdx = (currentIdx-1+searchMatches.length)%searchMatches.length; highlight(); }});
        searchNextBtn.addEventListener('click', ()=>{ if(searchMatches.length){ currentIdx = (currentIdx+1)%searchMatches.length; highlight(); }});
        clearSearchBtn.addEventListener('click', ()=>{ searchInput.value=''; searchMatches=[]; m3uOutput.setSelectionRange(0,0); });

        // Clean errors
        errorBoxJson.style.display='none'; errorBoxM3u.style.display='none';
    })();
</script>
</body>
</html>
